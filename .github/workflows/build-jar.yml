name: Build Maven JAR (Java 21)

on:
  push:
    branches: [ "master" ]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build with Maven
        run: mvn clean package

      - name: Create builds folder
        run: mkdir -p builds

      - name: Move JAR into builds folder
        run: cp target/*.jar builds/GeneralAPI.jar

      - name: Commit and push JAR
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add builds/app.jar
          git commit -m "Add build JAR" || echo "No changes to commit"
          git push
